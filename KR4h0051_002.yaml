body:
  text: 唐僧𢎞秀集卷二宋李龏編靈澈十一首聽鶯歌新鶯傍簷曉更悲孤音清泠囀素枝口邊血出語未盡豈是怨恨人不知不食枯桑葚不銜苦李花偶然弄樞機婉轉凌煙霞衆雛飛鳴何跼促自覘游蜂啄枯木𤣥猿何事朝夜啼白鷺長在汀洲宿黑鵰黄鶴豈不高金籠玉鈎傷羽毛三江七澤去不得風煙日暮生波濤飛去來莫上髙城頭莫下空園裏城頭鴟烏拾羶腥空園燕雀爭泥滓願當結舌含白雲五月六月一聲不可聞送鑒供奉歸蜀寧親林間出定戀庭闈聖主恩深暫許歸雙樹欲辭金錫冷世尊入滅于婆羅雙樹四花猶向玉階飛四花曼殊沙摩訶曼陀羅摩訶曼殊沙此云柔軟曼陀羅此云適意也梁山拂漢分清境蜀雪和煙惹翠微此去不須求綵服紫衣全勝老萊衣朝廷賜僧衣曰紫衣九日和于使君思上京親故清晨有高㑹賔從出東方楚俗風煙古汀洲水木涼山情來逺思菊意在重陽心憶華池上従容鵷鷺行宿東林寺天寒猛虎嘯巖穴林下無人空有月千年像教今不聞興像教龍樹大師也焚香獨為鬼神説東林寺酬韋丹刺史年老心閒無外事麻衣草座亦容身相逢盡道休官好林下何曾見一人答徐廣州四問童子出家無第行隨師乞食遣稱名長沙豈敢論年幾絳老惟知甲子生逺公墓古墓石稜稜寒雲晚景凝空悲虎溪月不見雁門僧歸湖南山邉水邉待月明暫向人間借路行如今還向山邉去只有湖水無行路簡寂觀古松古栢巖壁間猿攀鶴巢古枝折五月有霜六月寒時見山翁來取雪聞李處州亡時時聞説故人死日日自悲垂老身白髪不生應不得青山長在屬何人天台山華頂峰天台衆峰外華頂當寒空有時半不見崔嵬在雲中靈一二十八首棲霞山夜坐山頭戒壇路幽映雪巖側四面青石牀一峰苔蘚色松風靜復起月影開還黑何獨乘夜來殊非晝所得宿天柱觀石室初投宿仙翁喜暫容花源隔水見洞府過山逢泉湧堦前地雲生户外峰中宵自入定非是欲降龍酬皇甫冉將赴無錫於雲門寺贈别湖南通古寺來徃意無涯欲識雲門路千峰到若耶春山子敬宅古木謝敷家自可長偕隠那言相去賖宜豐新泉泉源新湧出洞澈映纎雲稍落芙蓉沼初淹苔蘚文素將空意合淨與衆流分每到清宵月泠泠夢裏聞靜林精舍靜林溪路逺蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三世火樹老萬株松無數煙霞色空聞昔臥龍江行寄張舍人客程終日風塵苦蓬轉還家未有期林色曉分殘雪後角聲寒奏落帆時月高星使東看逺雲破霜鴻北度遲流蕩此心難共説千峰澄霽隔瓊枝送王頴悟客意天南興已闌不堪言别向仙官夢揺玉珮隨旄節心到金華憶杏壇荒郊極望歸雲盡瘦馬空嘶落日殘想得故山青靄裏泉聲入夜獨潺潺安公彌天稱聖哲象法初繄賴𢎞道識行藏匡時知進退秦王輕與舉習生重酬對學文古篆中義顯新經内法服應華夏金言流海岱西方浮雲間更倍龍花㑹林公支公信髙逸乆向山林住時將孫許遊豈以形骸遇幸辭天子詔復覽名臣疏西晉尚虛無南朝久淪悮因談老莊意乃盡逍遥趣誰為竹林賢風流相比附逺公逺公逢道安一朝棄儒服眞機久消歇世教空拘束誓入羅浮中遂棲廬山曲禪經初纂定佛語新名目鉢㡌絶朝宗簮裾翻拜伏東林多隱士為我辭榮禄雨後欲尋天目山問元駱二公溪路昨夜雲生天井東春山一雨一囘風林花併逐溪流下欲上龍池通不通題王僧院虎溪閒月引相過帶雪松枝挂薜蘿無限青山行欲盡白雲深處老僧多宿靜林寺山寺門前多古松溪行欲到已聞鐘中宵引領尋高頂月照雲峰凡幾重再還宜豐寺再尋招隱地重㑹息心期樵客問歸日山僧記别時野雲隂逺甸秋雨漲前陂勿謂探形勝吾今不好竒酬陳明府舟中見贈長溪通夜靜素舸與人閒月影沈秋水風聲落暮山稻花千頃外蓮葉兩河間陶令多眞意相思一解顔題東蘭若上人禪室路徘徊萬木清隂向日開寒竹影侵行道石秋風聲入誦經臺閒雲不繫從舒卷狎鳥無機任往來更惜片陽談妙理歸時莫待暝鐘催送朱放苦見人間世思歸洞裏天縱令山鳥語不廢野人眠歸岑山過惟審上人别業禪客無心憶薜蘿自然行徑向山多知君欲問人間事始與浮雲共一過於潜道中作呈元八處士苕水灘行淺潜州路漸深參差遠岫色迢遞野人心凍澗氷難釋秋山月易隂不知天目下何處是雲林送殷判官歸上都漾舟雲路客來過夕陽時向背堪遺恨逢迎宿未期水容愁暮急花影動春遲别後王孫草青青入夢思贈别皇甫曾幽人從遠岳過客愛春山高駕能相送孤遊且未還紫苔封井石緑竹掩柴闗若到雲峰外齊心去住間送陳元初卜居麻源欲向麻源隱能尋謝客蹤空山幾千里幽谷第三重茅宇寧須葺荷衣不待縫因君見往事為我謝喬松秋題劉逸人林泉凉飈亂黄葉遲客橘隂清蘿徑封行跡雲門閉野情零林秋露響穿竹暮煙輕莫戀幽棲地懐安却敗名自大林與韓明府歸郭中精舍野客同舟楫相㩦復一歸孤煙生暮景逺岫帶春暉不道還山是誰云向郭非禪門有通隱喧寂共忘機同使君宿大梁驛或作清江旌旗江上出花外捲簾空夜色臨城月春寒度水風雖然行李别且喜語音同若問匡廬事終身媿逺公題黄公陶翰别業聞說花源堪避秦幽尋數月不逢人煙霞洞裏無雞犬風雨林中有鬼神黄公石上三芝秀陶令門前五栁新醉卧白雲閒作夢不知何物是吾身哭衞尚書畫㦸重門楚水隂天涯欲暮共傷心南荆雙履痕猶在北斗孤䰟望已深蓮花幕下悲風起細桞營邊曉月臨前路茫茫向誰問感君空有淚沾襟贈靈澈禪師禪師來徃翠微間萬里千峰到剡山何時共到天台裏身與浮雲處處閒惟審二首春日旅懐呈知己生涯萬事有蒼蒼應任流萍便越鄉春水獨行人漸逺故園歸路夜空長一聲隔浦猿啼處數滴驚心淚滿裳不為知音皆鮑叔信誰江上去茫茫賦得聞黄鳥啼捲簾清夢後芳樹引流鶯隔葉傳春意穿花送曉聲未調雲路翼空負桂林情莫盡闗闗興羇愁正厭生唐僧𢎞秀集巻二

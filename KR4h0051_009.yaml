  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0051_WYG_009-1a, image: WYG1356/WYG1356-0912c.png}
body:
  text: 唐僧𢎞秀集卷九宋李龏編卿雲四首長安言懐寄沈彬待郎故園梨嶺下歸路接天涯生作長安草勝為邊地花雁南飛不到書北寄來賖堪羨神仙客青雲早致家秋日江居閒詠寄居江島邊閒詠幾秋殘草白牛羊瘦風高猿鳥寒檢方醫故疾挑薺備中餐時復停書巻鉏莎種木蘭送人遊塞去去玉闗路省君曾未行塞深多伏冦時靜亦屯兵雪每先秋降花常近夏生閒陪射鵰將應到受降城舊國里舊居梨嶺下風景近炎方地暖生春早家貧覺嵗長石房雲過溼杉徑雨餘香日夕竟無事詩書聊自强柄一二首垓下懐古緬想咸陽事可嗟楚歌哀怨思無涯八千子弟歸何處萬里鴻溝屬漢家弓指陣前爭日月血流垓下定龍蛇㧞山力盡烏江水今古悠悠空浪花武昌懐古戰國城池盡悄然昔人遣迹遍山川笙歌罷歇幾多日臺榭荒凉七百年蟬響夕陽風滿樹雁横秋島雨漫天堪嗟世事如流水空見蘆花一釣船澹交二首病後作未得亡身法此身終未安病腸猶可洗瘦骨不勝寒藥少心情餌經無氣力㸔悠悠片雲質獨對夕陽殘寫眞圖形期自見自見却傷神已是夢中夢更逢身外身水花凝幻質墨彩聚空塵堪笑予兼爾俱為未了人良乂一首答盧善風泉祗向夢中聞身外無餘可寄君當户一輪惟曉月掛簷數片是秋雲若虛二首樂眞觀樂氏騎龍上碧天東呉遺宅尚依然悟來大道無多事眞後丹丸不直錢老樹夜風蟲咬葉古壇春雨蘚生氊松傾鶴死桑田變華表歸鄉未有年懐廬山舊隠九疊嵯峩倚著天悔隨寒瀑下巖煙深秋猿鳥來心上夜靜松杉到眼前書架想遭苔蘚裹石牕應被薜蘿纒一枝笻竹遊江北不見爐峰二十年雲表一首寒食日寒食悲㸔郭外春野田無處不傷神平原壘壘添新塚半是去年來哭人曇域二首宿鄭諫議山居堂開星斗邊大諫採薇還禽隠石中樹月生池上山凉風吹詠思幽語隔禪闗莫擬歸城計終妨此地閒懐齊已髩髯秋景兩蒼蒼靜對茅齋一炷香病後身心俱澹泊老來朋友半凋傷峩嵋山色侵雲直巫峽灘聲入夜長猶喜深交有支遁時時音信到松房子蘭十四首短歌行日月何忙忙出沒住不得使我勇壮心少年如頃刻人生石火光通時少於塞四季倐徃來寒暑變為賊偷人靣上花奪人頭上黑飲馬長城窟游客長城下飲馬長城窟馬嘶聞水腥為浸征人骨豈不是流泉終不成潺湲洗盡骨上土不洗骨中寃骨若比流水四海有還䰟空流嗚咽聲聲中疑是言夜直大内隔重墻多聞樂未央燈明宫樹色茶煮禁泉香鳯輦通門靜雞歌入漏長宴榮陪御席話宻近龍章吟步彤庭月眠分玉署凉欲粘朱紱重頻草白麻忙筆力将羣吏人情在致唐萬方瞻仰處晨夕靣吾皇蟬獨蟬初唱古槐枝委曲悲凉斷續遲雨後忽聞誰最苦異鄉孤館憶家時登樓邊邑鴻聲一例秋大波平日遶山流故人千里同明月盡夕無言空倚樓長安早春風舞槐花落御溝終南山色入城秋門門走馬徵兵急公子笙歌醉玉樓對雪宻宻無聲墜碧空霏霏有韻舞微風幽人吟望搜辭處飄入牕來落硯中太平里尋兵部裴郎中不語凄凉無限情荒階行盡又重行昔年住此人何在空見槐花秋草生寄乾陵楊侍郎冷落官資不畏貧司曹且共内官分步量野色成公案㸃檢樵聲入奏聞陵廟路因朝去掃御爐香每夜來焚碑寒樹古神門上管得無窮空白雲登樓憶友物象遠濛濛周廻極望中帶煙千井樹和磬一樓風月色寒沉地波聲夜颺空登臨無限趣恨不與君同華嚴寺望樊川萬木葉初紅人家樹色中疎鐘搖雨脚積水浸雲容雪磧囘寒雁村燈促夜舂舊山歸未得生計欲何從與道侣同於水陸寺㑹宿論道窮心少有朋此時清話昔年曾柿凋紅葉鋪寒井鴿墜霜毛著定僧風遞逺聲秋澗水竹穿深色夜房燈出門盡是勞生者只此長閒幾箇能城上吟古塚宻於草新墳侵官道城外無閒地城中人又老襄陽曲為憶南遊人移家大堤住千帆萬帆來過盡門前去僧鸞二首苦熱行燭龍銜火飛天地平陸無風海波沸彤雲疊疊聳竒峰焰焰流光熱疑翠煙島搏鵬嚲雙翅羲和赫怒强總轡飲流夸父斃長途始見當中印王字明明夜西朝又東古來有道仍再中扶桑老葉蔽不得輝華直欲凌蒼空行人揮汗翻成雨口燥喉乾隘塵土西郊雲色晝㝠㝠如何不救生靈苦何山怪木藏蛟龍縮鱗巻鬛為乖慵不發滂澤注天下欲使風雷何所從旱苖原上枯成焰嶽靈徒祝無神騐豪家簾外喚清風水紋明角鋪長簟玉扇畫堂凝夜秋歌艷繞梁催莫愁陽烏落盡酒不醒扶上西園當月樓廢田暍死非吾屬庫有黄金倉有粟贈李粲秀才字輝用隴西輝用真才子搜竒探險無倫比筆下銛磨巨闕鋒胸中靜灧西江水哀絃古樂清人耳月露激寒哭秋鬼苔地無塵到曉吟杉松老葉風乾起十軸示余三百篇金碧爛光燒蜀牋雄芒逸氣測不得使我躑躅成狂顚大郊逺闊空無邊凝明淡緑收餘煙曠懐相對景何限落日亂岑青倚天又驚大舶帆高懸行濤劈浪凌飛仙囘首瞥見五千仞撲下香爐瀑布泉何事古人誇八斗焉敢今朝定妍醜颯風驅雷暫不停始向塲中稱大手駿如健鶻鶚與鵰拏雲獵野翻重霄狐狸竄伏不敢動却下雙鳴當迅飈愁如湘靈哭湘浦咽咽哀音隔雲霧九嶷深翠轉巍峩仙骨寒消不知處清同野客敲越甌丁當急響涵清秋鸞雛相引叫未定霜結夜闌仍在樓高若太空露雲物片白激青皆彷彿仙鶴閒從淨碧飛巨鼇頭戴蓬萊出前軰歌詩惟翰林神仙老格何高深鞭馳造化繞筆轉燦爛不為酸苦吟夢乘明月清沉沉飛到天台天姥岑傾湖湧海數百字字字不朽長摐金此日多君可儔侣堆珠疊璣滿𤣥圃終日並轡遊崑崙十二樓中宴王母懐楚二首謝友人見訪留詩軒車誰肯到泉石自相親暮雨凋殘寺秋風悵望人庭新一片葉衣故十年塵賴有瑤華贈清吟愈病身送新平故人常聽倉庚思舊友又因蝴蝶夢生涯一千餘里河連郭三十六峯寒到家隂島宜分東虢雁晴樓高入上陽鴉姜嫄廟北與君别應笑薄寒悲落花惠標四首賦山靈山藴麗名秀出冩蓬瀛香爐帶煙上紫蓋入霞生霧巻蓮峰碧巖開石鏡明定知丘壑裏併佇白雲情又峩嵋信重險天目本仙居金華抱丹竈玉笥藴神書幽人披薜荔怨妾採蘼蕪紫岩無暮雨何時送故夫咏水曾添疎勒井經湧貳師營玉津花色亮銀溪錦磧明舟如空裏泛人似鏡中行持將符上善利物動高情又長川落日照深浦漾清風弱栁垂江翠新蓮夾岸紅船行疑泛迥月映似沉空願逐琴高戯乘魚入浪中可朋一首桐花鳥五色毛衣比鳯雛花深叢裏祗如無美人買得偏憐惜移向金釵重幾銖懐浦二首贈智舟三藏壯嵗心難伏師心伏豈難尋常獨在院行坐不離壇嶽雪當禪暝松風入呪寒更因文字外多把史書㸔初冬旅舍蚤懐枕上角聲微離情未息機夢囘三楚寺寒入五更衣月沒棲禽動霜晴凍葉飛自慚行役早深與道相違慕幽四首酬友人見寄家國各萬里同吟六七年可堪隨北雁迢遞向南天水共行人逺山將落日連春淮有雙鯉莫忘尺書傳冬日淮上别文上人勞歌好自㸔終久偶齊桓五字若教易一名爭得難侵牕紅樹老蔭砌雪花殘莫效齊僚屬東歸翦釣竿栁今古憑君一贈行幾囘折盡復重生五株斜傍淵明宅千樹低垂太尉營臨水帶煙藏翡翠倚風兼雨宿流鸎隋皇堤畔依依在曾惹當時歌吹聲三峽聞猿誰向兹來不恨生聲聲都是斷腸聲七千里外一家住十二峰前獨自行瘴雨晚藏神女廟蠻煙寒鎖夜郎城憑君且莫哀吟好㑹待青雲道路平善生四首送玉禪師飄然無定迹迥與律乘違入郭隨緣住思山破夏歸過夏不終謂之破夏盂擎數家飯衲乞幾人衣洞了曹溪㫖寧輸俗者機送智光之南值雨結束衣囊了炎州定去遊草堂方惜别山雨為相留又得一宵話免生千里愁莫辭重卜日後會必經秋旅中答喻軍事問客情一自遊他國相逢少故人縱然為客樂爭似在家貧畜恨霜侵髩搜詩病入神若非憐片善誰肯問風塵贈盧逸人高眠巖野間至藝敵應難詩苦無多首藥靈惟一丸引泉魚落釜攀果露沾冠已得嵇康趣逢迎事每䦨亞栖二首對御書後一絶通神筆法得𤣥門親入長安謁至尊莫怪出來多意氣草書曾悅聖明君題英禪師將知徳行異尋常每見持經在道塲欲識用心精潔處一缾秋水一罏香唐僧𢎞秀集巻九

body:
  text: 唐僧𢎞秀集卷六宋李龏編貫休六十一首古意六首一雨火雲盡閉門心冥冥蘭花與芙蓉滿院同芳馨佳人天一涯好鳥鳴嚶嚶我有雙白璧不羡於虞卿我有徑寸珠别是天地精玩之室生白瀟灑身安輕只應天上人見我雙眼明其二陽烏爍萬物草木懷春恩茫茫塵土飛培擁名利根我本事蓑笠那知天子尊學為毛氏詩亦多直致言不慕蠕蠕類附勢同崩奔惟尋桃李蹊去去長者門其三美人如游龍被服金鴛鴦手把古刀尺在彼白玉堂文章深掣曵珂珮嗚玎璫好風吹桃花片片落銀牀何當舉羽翰逺逐朱鳥翔其四乾坤有清氣散入詩人脾聖賢遺清風不在惡木枝千人萬人中一人兩人知憶在東溪日花開葉落時幾擬以黃金鑄作鍾子期其五古交如真金百鍊色不回今交如暴流倐忽生塵埃我願君子氣散為松柏栽我恐荆棘花只為小人開傷心復傷心吟上髙髙臺其六莫輕白雲白不與風雨㑹莫見守羊兒謂是初平輩人生非日月光輝豈長在一榮與一辱今古常相對不見于公門子孫好冠蓋行路難君不見山高海深人不測古今往來轉青碧淺近輕浮莫與交地卑只解生荆棘誰道黃金如糞土張耳陳餘斷消息行路難行路難君自看其二不㑹當初作天地剛有多般愚與智到頭還用真宰心何如上下皆清氣大道冥冥不知處那堪頓得羲和轡義不義兮仁不仁擬學長生更容易負薪為爐復為火緣木求魚應且止君不見燒金煉石古帝王鬼火熒熒白楊裏其三君不見道傍廢井生古木本是驕奢貴人屋幾度美人照影來素綆銀瓶濯纎玉雲飛雨散今如此繡闥雕甍作荒谷沸渭笙歌君莫誇不應長是西家哭休說遺編行者幾至竟終須合天理敗他成此亦何功蘇張終作多言鬼行路難行路難不在羊腸裏輕薄篇二首繡林錦野春態相壓誰家少年馬蹄踏踏鬬雞走狗夜不歸一擲䐗却如花妾惟言不顚不狂其名不彰悲夫木落蕭蕭蟲鳴唧唧不覺朱蔫臉紅霜劫鬢漆世途多事泣向秋日方今少壯不努力老大悲傷復何益野田黃雀行高樹風多吹爾巢落蒿深葉暖宜爾依泊莫近梟類蛛網亦惡飲野田之清水食野田之黃粟深花中睡𡋯土裏浴如此即全勝啄太倉之穀而更穿人之屋懷素上人草書歌張顚顚後顚非顚直至懷素之顚始是顚師不談經不坐禪筋力惟於草書妙顚狂却恐是神仙有神助兮神莫及鐵石畫兮墨須入金樽竹葉數斗餘半飲半傾山衲濕醉來把筆猛如虎粉壁素屏不問主亂拏亂抹無規矩羅剎石上坐伍子胥蒯通八字立對漢高祖勢崩騰兮不可止天機暗轉鋒鋩裏閃電光中霹靂飛古柏身中旱龍死駭人心兮目眓呼鬱切􅀈香激切頓人足兮神辟易乍如沙場大戰後斷槍橛箭何狼籍又似深山怪石上古病松枝掛鐵錫月兔筆天竈墨斜鑿黃金側銼玉珊瑚枝長大如束天馬驕獰不可勒東却西南又北倒還起斷復續忽如鄂公捉住單雄信秦王肩上搭著棗木槊懷素師若不是星辰降瑞即必是河嶽孕靈固宜須冷笑逸少爭得不心醉伯英天台古杉一千尺崖崩岸折何崢嶸或細微仙衣縫綻金線垂或妍媚桃花半紅公子醉我恐山為墨兮海為水天為筆兮書大地乃能略展狂僧意長恨與師不相識一見此書空歎息伊昔張謂任華葉季良數子贈歌豈虛飾所不足者渾未曾道著其神力石橋被燒却良玉不土蝕錐畫沙兮印印泥世人世人莫得測知師雄名在世間明月清風有何極獻錢尚父貴逼人來不自由龍􅋮鳯翥勢難收滿堂花醉三千客一劒霜寒十四州鼓角揭天嘉氣冷風濤動地海山秋東南永作金天柱誰羡當時萬户侯春山行重疊太古色濛濛花雨時好山行恐盡流水語相隨黑壤生紅术黃猿領白兒因思石橋日曾與道人期詠吟經天緯地物動必計天才盡日覔不得有時還自來真風含素髮秋色入靈臺吟向霜蟾下終須神鬼哀送人赴舉兩河兵火後西笑見吾曹海靜三山出天空一鶴高賃居槐陟屋行卷雪埋袍他日如相見栽桃向海濤老僧獨住無人處松龕嶽色侵僧中九十臘雲外一生心白髮垂不剃青眸笑轉深猶能指孤月為我暫開襟贈道士闒茸復埃塵難親復易親皆疑有仙術問著却愁人秪是耽浮蟻曾云見泣麟相逢先合掌渾似有前因苦熱松桂晝不動陽烏飛半天稻麻難結實砂石欲生煙毒氣仍干扇高枝不立蟬舊山多貯雪歸去是何年贈隱者千峰映碧湘真隱此中藏飯不煮石喫眉應似雪長楓根支酒瓮鶴蝨落琴牀雖效忘機者斯人尚未忘送僧歸天台天台四絶寺歸去見師真莫折枸杞葉令他拾得嗔天空聞聖磬瀑細落花巾必若雲中老他時得有鄰新蟬尋常看不見花落樹多苔忽向高枝發又從何處來風清聲更揭月苦思彌哀多少求名者年年被爾催秋寄李頻使君務簡趣誰陪清吟共緑苔葉和秋蟻落僧帶野風來留客朝嘗酒憂民夜畫灰終期冒風雪江上見宗雷題簡禪師院機忘室亦空靜與沃洲同惟有半庭竹能生竟日風思山海月上出定印香終繼後傳衣者還須立雪中懷智體上人把筆懷吾友庭鶯百囀時惟應一處住方得不相思雪水淹門閫春雷折樹枝平生無限事不獨白雲知憶在山中時憶在山中時丹桂花葳蕤紅泉浸瑤草日夕生華滋箬屋開地爐翠墻挂藤衣看經竹窗邊白猿三四枝東峰有老人眼碧頭骨竒種薤煮白石㫖趣如嬰兒月上來打門月落方始歸授我微妙訣恬然無所為别來六七年只恐白日飛春晚書山家主人壁柴門寂寂黍飯馨山家煙火春雨晴庭花濛濛水泠泠小兒啼索樹上鶯深山逢老僧衲衣線粗心似月自把短鋤鋤榾柮青石溪邊踏葉行數片雲隨兩眉雪邊上作二首山無緑兮水無清風既毒兮沙亦腥胡兒走馬疾飛鳥聨翩射落雲中聲其二陳雲忽向沙中起探得胡兵過遼水堪嗟護塞征戍兒未戰已疑身是鬼宿深村行行一宿深村裏雞犬豐年閙如市黃昏見客合家喜月下取魚戽塘水書石壁禪居赤旃檀塔六七級白菡萏花三四枝禪客相逢勸歸去此心能有幾人知聽僧彈琴家近吳王古戰城海風終日打檣聲今朝鄉思渾堆積琴上聞師大蟹行再遊東林寺三首臺殿參差聳瑞煙桂花飄雪水潺潺莫疑遠去無消息七萬餘年始半年其二宣𤣥舊輦殘雲濕耶舍孤墳落照遲有箇山僧倚松睡恐人來取白猿兒其三玉像珠龕香陳橫錦霞多旁石墻生辟蛇行者今何在花裏惟聞鳩鳥聲題蘭江言上人院二首一生只著一麻衣道業還期習彥威手把新詩說山夢石橋天柱雪霏霏其二只是危吟坐翠層門前岐路自崩騰青雲名士時相訪茶煮西峯瀑布冰風琴至境心為造化功一枝青竹四絃風寥寥雙耳更深後如在緱山明月中繡州張相公見訪德符唐德瑞通天曾叱讒諛玉座前千襲綵衣宫錦薄數牀御札主恩偏出師暫放蕭何筯得罪惟撐范蠡船未報君恩終必報不妨金地禮青蓮秋夜曲蟪蛄切切風騷騷芙蓉噴香蟾蜍高孤燈耿耿征婦勞更深撲落金錯刀湘江懷古煙浪漾秋色高吟孰得鄰一輪湘渚月萬古獨醒人岸濕穿花遠雲香禱廟頻秪應諛佞者到此不傷神寒思廬山賈生山兄詩僻甚寒夜更何為覓句惟頑坐嚴霜打不知石膏粘木屐崖栗落冰池近見禪僧說生涯勝往時雪夜寄友人皓彩中宵合開門失所蹤何年今夜意共子在孤峰氣射燈花落光侵壁罅濃惟君心似我吟到五更鐘途中逢周朴東西南北路相遇共興哀世獨無知己子從何處來菊衰芳草在程遠宿煙開儻遇中興主還應不用媒休糧僧不食更何求自由中自由身輕嫌衲重天旱為民愁應器誰將去生臺蟻不遊㑹須傳此術相共老林丘題擇詞律師院律中麟角者高淡出塵埃芳草不曾觸幾生如此來壑風吹磬斷杉露滴花開如結林中社伊豫願一陪山居十首休話喧譁事事難山翁只合住深山數聲清磬是非外一箇閒人天地間緑圃空階雲冉冉異禽佳草水潺潺無人為向羣儒道巖桂枝高更好攀其二誰是言休即便休高吟靜坐碧峰頭三間茅屋無人到十里松關獨自游明月清風宗炳社夕陽秋色庾公樓修心未到無心地萬種千般逐水流其三露滴紅蘭玉繞畦閒拖象屐到峯西但令心似蓮花潔何必身將槁木齊古塹細煙紅樹老半巖殘雪白猿啼雖然不是桃源洞春至桃花亦滿溪其四嵐嫩風輕似碧紗雲樓金像隔煙霞葛苞玉粉生香壠菌簇銀釘滿淨槎舉世只知嗟逝水無人微解悟空花可憐擾擾塵埃裏雙鬢如絲事似麻其五心心心不住希夷石室巉巖白髮垂惜竹不除當路笋愛松留得礙人枝焚香開卷霞生砌捲箔冥心月在池無限故人頭已白不知今日復何之其六一庵瞑目在穹冥菌枕松牀蘚陳青乳鹿暗行柳徑雪瀑泉微濺石樓經閒吟不覺過天井長嘯還能動嶽靈應恐無人知此意非凡非聖獨醒醒其七五嶽煙霞連不斷三山洞穴去應通石窗欹枕疏疏雨水碓無人浩浩風童子念經深竹裏獼猴拾蝨夕陽中因嗟往事拋心力六七年來楚水東其八翠竇煙巖畫不成桂華瀑沫雜芳馨撥霞掃雪和雲母掘石移松得茯苓好鳥傍花窺玉磬嫩苔如水沒金瓶從他人笑從他笑地覆天翻也只寧其九自古浮華能幾幾逝波終日去滔滔漢王廢苑生秋草吳主荒宫入夜濤滿屋黃金機不息一頭白髮氣猶高豈知物外金仙子甘露天香滴毳袍其十自休自了自安排常願居山事偶諧僧採樹衣臨絶壑狖爭山果落空階閒擔茶器緣青嶂靜衲禪袍坐緑崖虛作新詩反招隱出來多與此心乖春野作閒步淺青平緑流水征車自速誰家挾彈少年擬打紅衣啄木寒江上望荒岸燒未死白雲癡不動極目無人行浪打取魚籠月夕霜月夜徘徊樓中羌笛催曉風吹不盡江上落殘梅唐僧𢎞秀集卷六

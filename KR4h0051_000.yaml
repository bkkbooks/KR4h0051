body:
  text: 唐僧𢎞秀集總集類提要臣等謹案唐僧𢎞秀集十巻宋李龏編龏有梅花衲翦綃集已著録此所選唐代釋子之詩自皎然以下凡五十二人詩五百首前有寳祐六年龏自序採摭頗富而亦時有不檢如釋寳月行路難一首載玉臺新詠第九巻中本非僻書又鍾嶸詩品下巻以齊釋惠休道猷寳月共為一條且詳録其事曰行路難是東陽柴廓所造寳月嘗憇其家會廓亡因竊而有之廓子賫手本出都欲訟此事乃宻賂止之云云亦非僻書龏乃録之第五巻中殊為舛誤至賈島始為浮屠名無本周朴始為浮屠名清塞後島遇韓愈勸返初服仕至長江簿朴為姚合所賞亦加冠巾黄巢之亂抗節罵賊而死其在士大夫中亦卓然不愧于儒者龏乃録其詩四十五首入此集亦為不類如云追録其為僧之作則賈島一集何以又不採録此亦自亂其例也豈誤以七巻所録吟馬嵬漢上諸詩之別一無本為即島耶唐釋能詩者衆其最著者莫過皎然齊已貫休然皎然稍弱貫休稍麤要當以齊已為第一今觀龏所録如集中聽琴劍客登南岳祝融峯諸篇不見收則別裁去取亦未盡諸僧所長然唐僧有專集者不過數家其餘散見諸書漸就澌滅龏能裒合而存之俾殘章斷簡一一有傳于後其收拾散亡要亦不能謂之無功也乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐僧𢎞秀集原序古之吟詠情性一本於詩詩至唐為盛唐之詩僧亦盛唐一代為高道為内供奉名𢎞材秀者三百年間今得五十二人詩五百首或取於各僧本集或出於諸家纂録皆有拔山之力搜海之功風製不塵一字弗贅發音雄富羣立崢嶸名曰唐僧𢎞秀集不敢藏於巾笥刋梓用傳識者第毫殘松管燈焰蘭膏截錦揚珠神愁鬼毒詩教湮微取以為緇流砥柱藝苑䂓衡非假沽名鼓吹於江湖也兼禪餘風月客外山川千古之下一目可見耳皇宋寳祐第六春中和節日荷澤李龏和父序

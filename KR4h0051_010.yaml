body:
  text: 唐僧𢎞秀集巻十宋李龏編尚顔十八首寄華隂司空侍郎劒佩已深扃茅為嶽靣亭詩猶少綺美畫肯愛丹青換筆修僧史焚香閲道經相邀來未得但想鶴儀形送劉必先力進憑詩業心焦闕問安遠行無處易孤立本來難楚月船中没秦星馬上殘明年有公道更以命推㸔送獨孤處士萬里去非忙惟攜貯藥囊山家消夜景酒肆過年光立鶴洲侵浪喧蟲壁近床誰人臨上路乞得變髭方紫閣隠者天高紫閣侵隠者信沉沉道長年兼長雲深草復深如非禪客見即是獵人尋北笑長安道埃塵古到今匡山居無才加性拙道理合藏蹤是處非深逺其山已萬重經時隣境戰獨夜隔雲舂昨日泉中見常魚亦化龍夷陵即事不難饒白髪相續是灘波避世嫌身晚思家乞夢多暑衣經雪著凍硯向陽呵豈謂臨岐路還聞聖主過與王嵩隠一生吟興僻方見業精微事若終難得鄉應不易歸亂収西日葉雙掩北風扉合國諸卿相皆曾著布衣江上秋思到來江上久誰念旅遊心故國無秋信隣家有夜砧坐遙翻不睡愁極却成吟即恐髭連髩還為白所侵冬暮送人長安冬欲盡又送一遺賢醉後情渾可言休理不然射衣秦嶺雪搖月漢江船亦過春兼夏囘期信有蟬送徐道人東遊長安人擾擾獨自有閒心海上山中去風前月下吟引猿秋果􅌻藏鶴曉雲深易姓更名數難教弟子尋與陳陶處士鍾陵城外住喻似玉沉泥道直貧嫌殺神清語亦低雪深加酒債春盡減詩題憶昔曾邀宿山茶獨自攜自紀諸機忘盡未忘詩似向詩中有所依遠境等閒支枕覔空山容易杖藜歸清猿一一居林叫白鳥雙雙避釣飛欲畫淨名居士像焚香願見陸探微寄荆門鄭凖傳衣傳鉢理難論綺靡銷磨二雅尊不許姓名留月觀終攜瓶錫去雲門牕間掛燭通宵在竹上題詩隔嵗存珍重荆州鄭從事十年同受景升恩懐智栖上人臨水登山自有期不同遊子暮何之閒眠黙坐身堪賞已去還來事可知林鳥隔雲飛一餉草蟲和雨叫多時思君最易令人老倚檻空吟所寄詩將欲再遊荆渚留辭岐下司徒竹錫銅瓶配衲衣殷公樓畔偶然離白蓮幾㸔從開日明月長吟到落時活計本無桑柘潤疎慵尋有水雲資今朝囘去精神别為得頭㕔宰相詩峽中酬荆南鄭凖山齋西向蜀江濆四載安居復有羣風雁勢高猶可見雪猿聲苦不堪聞新詩寫出難勝寶破衲披行却類雲每喜泝流賓客説元瑜刀筆潤雄軍贈村公紬衣木突此鄉尊白盡鬚眉眼未昏醉舞神筵隨鼓笛閒歌聖代和兒孫黍苖一頃垂秋日茅棟三間映古原也笑長安名利處紅塵半是馬蹄翻秋夜吟梧桐雨畔夜愁吟抖擻衣裾蘚色侵枉道一生無繫著湘南山水别人尋栖蟾十首短歌行蟬聲催菊笑浮世懶思量身得幾時活眼開終日忙千門無壽藥一鏡有愁霜早晚雲泥外光隂任短長放歌行諫頻甘得罪一騎入南深若順吾皇意即無臣子心織花蠻市布擣月象州砧䝉雪知何日凭樓望北吟宿巴江江聲五千里㵼碧急於絃不覺日又夜爭教人少年一汀巫峽月兩岸子規天山影似相伴濃遮到曉船遊邊邊雲四顧濃飢馬嗅枯叢萬里八九月一身西北風偷營天正黑戰地雪多紅昨夜東歸夢桃花煖色中贈南嶽𤣥泰禪師曹溪入室人終老甚難羣四十餘年内青山與白雲松和巢鶴㸔果共野猿分海外僧來説名高自小聞讀齊已上人集詩為儒者禪此格的惟仙古雅如周頌清和甚舜絃冰生聽瀑句香發早梅篇想得吟成夜文星照楚天居南嶽懐沈彬石房開竹扉茗外獨支頥萬木還無葉百年能幾時隔雲聞狖過截雨見虹垂因憶嶽南客晏眠吟好詩寄問政山聶威儀先生卧碧岑諸祖是知音得道無一法孤雲同寸心嵐光薰鶴詔茶味敵人參若向壺中去他年許我尋南中懐友生荔枝江下立望北幾思量隔海無書劄前年到漢陽瘴村人起早銅柱象揩光居此成何事尋君過碧湘除夜九冬三十夜寒與暖分開坐到四更後身添一嵗來魚燈延臘火獸炭化春灰青帝今應老迎新見幾囘舊刻尚顔夷陵即事詩後半首誤在栖蟾讀齊已集題後而栖蟾讀齊已集詩誤作尚顔自紀理瑩一首送戴三徵君還谷口舊居巖穴多遺秀弓車屡逺招周王尊渭叟潁客傲唐堯出處天波洽闗河地勢遙瞻星呉郡夜作霧華山朝清論虛重席門居掛一瓢漁歌思坐酌宸渥寵行軺春為荷裳暖霜因葛履消層崖懸瀑溜萬壑振清飈谷鳥還遷木塲駒正食苗謝安何日起台鼎佇君調歸仁六首自遣日日為詩苦誰論春與秋一聨如得意萬事總忘憂雨墮花臨砌風吹竹近樓不吟頭也白任白此生頭酬沈顔先軰巻一百八十首清泠韻可敲任從人不愛終是我難抛桂魄吟來滿蒲團坐得凹先生聲價在寰宇幾人抄題賈島吟詩臺此臺如可廢此恨有誰平縱使迷青草終難沒舊名天悲朝雨色嶽哭夜猿聲不是心偏苦應闗自古情題楚廟羞容難更返江東誰問從來百戰功天地有心歸道徳山河無力為英雄蘆花尚認霜戈白海日猶思火陣紅也是男兒成敗事不須惆悵對西風牡丹三春堪愛牡丹竒半倚朱欄欲綻時天下更無花勝此人間偏得貴相宜偷香黑蟻斜穿葉覷蕋黄蜂倒掛枝除却解禪心不動筭應狂殺五陵兒悼羅隠一著䜛書未快心幾抽胸臆縱狂吟管中窺豹我猶在海上釣鼇君也沉嵗月盡能消憤懣寰區那更有知音長安冠蓋皆塗地仍喜先生葬碧岑𤣥寶一首路南北東西去茫茫萬古塵闗河無盡處風雪有行人險極山通蜀平多地入秦營營名利者來往豈辭頻虛中九首贈秀才筠陽多勝致夫子縱遊遨鳯鳥瑞不見鱸魚價轉髙門開沙觜靜船繫樹根牢誰解伊人趣村沽對鬱陶送遷客倐忽墮鵷行天南去路長片言曾不諂獲罪亦何傷象戀藏牙浦人貧賣子鄉此心終合雪去已莫思量石城金谷晉祚一傾摧驕奢去不囘只應荆棘地猶作綺羅灰狐兔閒生長樵蘇靜往來踟蹰意無盡寒日又西隤庾樓郡樓名甚遠幾换見樓人庾亮䰟應在清風到白蘋晴軒分楚漢夜酒揖星辰何必匡山上獨言無世塵哭悼朝賢前昨囘私第旋聞寢疾終四隣方響絶二月牡丹空塚已遷名境碑仍待至公祇應遺愛理長在楚南風寄華山司空圖二首門徑放莎垂往來投刺稀有時開御札特地掛朝衣嶽信僧傳去仙香鶴帶歸他年二南化無復更衰微其二逍遙短褐成一劒動精靈白晝夢仙島清晨禮道經黍苖侵野徑桑堪汚閒庭肯要為隣者西南太華青悼方干處士先生在世日祗向鏡湖居明主未巡狩白頭閒釣魚煙莎一徑小洲島四隣疎獨有為儒者時來弔舊廬贈栖蟾上人巖房高且靜住此幾寒暄鹿嗅安禪石猿啼乞食村朝陽生樹罅古路透雲根獨我閒相覔凄凉碧洞門惠偘一首聽獨杵擣衣非是無人助意欲自鳴砧向月憐孤影承風送迥音疑擣雙絲練似奏一絃琴令君聞獨杵知妾有專心法宣一首和趙王觀妓桂山留上客蘭室命妖嬈城中畫廣黛宫裏束纎腰舞袖風前舉歌聲扇後嬌周郎不須顧今日管絃調文秀一首端午節分端午自誰言萬古傳聞為屈原堪笑楚江空渺渺不能洗得直臣寃僧泚一首北原别業野外車騎絶古村桑柘隂流鶯出谷靜青草閉門深學稼農為業忘情道作心因知上皇日鑿開松竹林清尚二首贈樊川長老或作可止瘦顔諸骨現滿靣雪毫垂坐石鳥疑死出門人謂癡照身潭入楚浸影檜生隋太白曾經夏清風凉四肢哭僧道力自超然身亡同坐禪水流元在海月落不離天溪白葬時雪風香焚處煙世人頻下淚不見我師𤣥智暹一首律僧濾水與籠燈長長䕶有情自從青草出便不下堦行北闕應無夢南山舊有名將何喻浮世惟指浪漚輕唐僧𢎞秀集巻十

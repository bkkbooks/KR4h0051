  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0051_WYG_003-1a, image: WYG1356/WYG1356-0876c.png}
body:
  text: 唐僧𢎞秀集卷三宋李龏編䕶國十首題王喬觀傅道士所得王喬已去空山觀白雲只今凝不散壇場月露幾千年徃徃笙歌下天半瀑布西行過石橋黄精採根還採苗忽見一人擎茶椀蓼花昨夜風吹滿自言住處在東坡白犬相隨邀我過松間石上有棊局能使樵人爛斧柯歸山作喧靜各有路偶隨心所安縱然好朝市終不忘林巒四皓將拂衣二疏能挂冠忩前隱逸傳每日三時㸔靳尚那可論屈原亦可歎至今黄泉下名及青雲端松牕見初月花間禮古壇何處論心懐世上空漫漫别盛安情人取次幾淹留别後南州與北州月色為憐今夜客砧聲那似去年秋欲除豺虎論三畧莫對雲山詠四愁親故相逢且借問古來無種是王侯逢靈道士浮丘山上見黄冠松栢森森登古壇一莖青竹以為杖數顆仙桃仍未餐長安市裏常賣卜武陵溪畔每燒丹縮地徃來無定所花源到處路漫漫傷蔡處士篋中遺草是琅玕對此空令灑淚㸔三徑尚餘行跡在數螢猶是映書殘晨光不借泉門曉暝色惟添壠樹寒欲問皇天天更逺有才無命説應難訪雲母山僧森然古巖裏凈行一番僧松下濾寒水佛前挑夜燈蓮花國土異貝葉梵書能想到空王境無心問愛憎題王班水亭湖上見秋色曠然如爾懐豈惟歡隴畝兼亦外形骸待月歸山寺彈琴坐暝齋布衣閒自貴何用謁天階許州鄭使君孩子毛骨貴天生肌膚片玉明見人空解笑弄物不知名國器嗟猶小門風望益清抱來芳樹下時引鳯雛聲愴故人舊居惆悵至日暮寒鴉啼樹林破堦苔色厚殘壁雨痕深命與時不遇福為禍所侵空餘行徑在令我歎人吟臨川道中出谷入谷路囘轉秋風已至歸期晚舉頭何處望來蹤萬仞千山鳥飛逺無可二十五首遊山寺千峰盤路盡林寺昔何名歩歩入山影房房聞水聲多年人跡絶殘日石隂清自可求居止安閒過此生寄青龍寺原上人斂屨入寒竹安禪過漏聲高杉殘子落深井凍痕生罷磬風枝動懸燈雪屋明何當招我宿乘月上方行秋寄從兄賈島暗蟲喧暮色黙坐思西林聽雨寒更盡開門落葉深昔因京邑病併起洞庭心亦是吾兄事遲囘直至今送李騎曹之武寧一嵗一歸寧涼天數騎行河來當塞曲山遠與沙平縱獵旗風卷聽笳帳月生新鴻引寒色囘日滿京城秋日寄厲𤣥先軰楊栁起秋色故人猶未還别離俱自老少壮豈能閒夜雨吟殘燭秋城憶遠山何當一相見語黙此林間贈詩僧寒山對水廊竹葉影侵堂洗藥氷生岸開門月滿牀病多身又老枕倦夜兼長來謁吾僧者呈詩問否臧送吕郎中赴滄州出守滄州去西風送斾旌路遙經幾郡地盡到孤城拜廟千山緑開樓遍海清何人共束望日向積濤生書馬如文石門居别業逸高情暮泉喧客亭林囘天闕近雨過石門青野果誰來拾山禽獨卧聽要迎文㑹友時復掃柴扃送章正字秩滿東歸朝衣登别席春色滿秦闗芸閣吏誰替海門身又還尋僧流水僻見月逺林閒雖是忘機者難齊去住間送姚宰任吉州安福縣落絮滿衣裳攜琴問水鄉挂帆南入楚到縣半浮湘吏㪚翠禽下庭閒斑竹長人安宜逺泛沙上蕙蘭香送李少府之任臨邛邛南方作尉調補一何卑發論惟公幹承家乃帝枝山長風裊棧江䕃石和澌舊井王孫宅還尋獨有期送僧歸中條夜葉動飄飄寒來話數宵卷經歸物外轉雪下山椒舊坐松杉大難行水石遙元戎宗内學應就白雲招贈圭峰禪師絶壑禪床底泉分落石層霧交高頂草雲隠下方燈朝滿傾心客谿通學道僧半旬持一食此行有誰能金州别姚合日日西亭上春留到夏殘言之離别易勉以道途難山出一千里溪行三百灘松間樓裏月秋入五陵㸔隕葉遶巷夾溪紅蕭條逐北風别林遺宿鳥浮水載鳴蟲石小埋初盡枝長落未終帶霜書麗什閒讀白雲中李常侍書堂結構因墳籍簷前竹未生塗油忩日早閱槧幌風輕息架蛩驚客垂燈雨過城已應窮古史師律孰齊名送邵錫及第歸湖州春闗鳥啼罷歸慶浙煙西郡守招延重鄉人慕仰齊橘青逃暑寺茶緑隔湖溪乘暇知髙眺微應辨㑹稽送清散遊太白山卷經歸太白躡蘚别蘿龕若履浮雲上須㸔積翠南倚身松入漢瞑目月離潭此境堪長徃塵中事可諳冬晚姚諫議宅㑹送元緒上人歸南山禪客詩家見凝寒忽告還分題囘諫筆留偈出商闗盤徑緣高雪開房在半山自知麋鹿性亦欲離人間春晚喜悟禪師自瑠璃上方見過瑠璃師到城談性外諸經下嶺雪霜在近人林木清苔痕深草履瀑水滴銅瓶樂問山中事宵言徹曉星秋暮與諸文士集宿姚端公所居宵清月復圓共集侍臣筵獨寡區中學空論樹下禪風多秋晚竹雲盡夜深天此㑹東西去堪愁又隔年冬中聞從兄島遊蒲絳因寄遙遙行李心蒼野入寒深吟待黄河雪眠聽絳郡砧差期逢缺月訪信出空林何處孤燈下只聞嘹唳禽送李長官之任東井江盤棧轉虛候吏拜行車家世維城後官資宰邑初市饒黄犢賣田躡白雲鉏萬里千山路何因欲寄書宿安國簡公院雨後清涼境因過欲不囘井甘桐有露竹迸地多苔幡映宫牆動香從御苑來青龍舊經疏寥落有誰開夏日送崔秀才南方山水地念子為貧遊縱是逢佳景那能緩旅愁夕陽行逺道煩暑在孤舟莫向巴山過猿啼蹙淚流唐僧𢎞秀集巻三

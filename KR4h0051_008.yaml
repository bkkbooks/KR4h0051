  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0051_WYG_008-1a, image: WYG1356/WYG1356-0906a.png}
body:
  text: 唐僧𢎞秀集卷八宋李龏編修睦十二首秋日間居是事不相關誰人似此間捲簾當白晝移榻對青山野鶴眠松上秋苔長雨間嶽僧頻有信昨日得書還宿嶽陽開元寺竟夕憑虛檻何當興歎頻往來人自老今古月長新風逆沈漁唱松疏露鶴身無眠鐘乂動幾客在迷津送邊將人盡有離别而君獨可嗟言將身報國敢望祿榮家戰思風吹野鄉心月照沙歸期定何日塞北樹無花雪中送人北遊然知心去速其奈雪飛頻莫喜無危道雖平更陷人逺郊光接漢曠野色通秦此去迢遙極却回應過春落葉雨過間田地重重落盡紅翻思向春日肯信有秋風幾處隨流水河邊亂暮空秪應松自立而不與君同落花一片又一片等間苔靣紅不能延數日開亦是春風公子歌聲歇詩人眼界空遙思故山下經雨兩三叢題田道者院入門空寂寂真箇出家兒有行鬼不見無心人謂癡古巖寒柏對流水落花隨欲别一何懶相從所恨遲東林寺欲去不忍去徘徊吟繞廊水光秋淡蕩僧好語尋常碑古苔文疊山晴鐘韻長翻思南嶽上欠此白蓮香寄貫休上人常語亦關詩常流安得知楚郊來未久吳地住多時立月無人近歸林有鶴隨所居渾不逺相識偶然遲喜僧友到十年消息斷空使夢煙蘿嵩嶽幾時下洞庭何日過瓶乾離澗久衲壞卧雲多意欲相留住遊方肯舍麼懷虛中上人簷雨滴更殘思君安未安湘川聞不逺道路去尋難吟鬢霜應蝕禪衣雪漸寒倚松因獨立一鳥下江干簡寂觀正同高士卧煙霞思著間忙又是嗟碧岫觀中人似鶴紅塵路上事如麻石肥滯雨添蒼蘚松老涵風落翠花莫道此間無我分遺民長在惠持家無悶二首暮春送人折栁亭邊手重攜江煙淡淡草萋萋杜鵑不顧離人意更向落花枝上啼寒林石屏草堂無物伴身間惟有屏風枕簟間本向他山求得石却于石上看他山太易一首贈司空拾遺侍臣何事辭雲陛江上微吟見雪花望闕未承丹鳯詔閉門空對楚人家陳琳草奏才還在王粲登樓興尚賖高館更容塵外客仍令歸路奉瑤華景雲三首老僧日照西山雪老僧門始開凍瓶粘柱磯宿火陷爐灰童子病歸去鹿麋寒入來齋鐘知漸近飯鳥下生臺施食臺謂出生臺溪叟溪翁居處靜溪鳥入門飛早起釣魚去夜深乘月歸露香菰米熟煙暖荇絲肥瀟灑塵埃外扁舟一草衣畫松畫松一似真松樹且待尋思記得無曾在天台山上見石橋南畔第三株法振十一首振一作震病愈寄友哀樂暗成疾卧中芳月移西山有清士孤嘯不可追搗藥晝林靜汲泉隂澗遲微蹤與麋鹿遠謝求羊知送韓侍御自使幕巡海北微雨過山夜洗兵繡衣遙拂海風清幕中運策心應苦馬上題詩卷已成離亭不惜花源醉古道猶看蔓草生因説元戎能破敵高歌一曲隴關情送常大夫赴朔方關山今不掩軍候鳥先知大漢嫖姚入烏孫部曲隨高旌天外駐寒角月中吹歸到長安第花應再滿枝送人遊閩越不須行借問為爾話閩中海島陰晴日江帆來去風道遊玄度宅身寄朗陵公此别何傷逺如今關塞通越中贈程先生紗帽度殘春虛舟寄一身溪邉逢越女花裏問秦人古塞連山靜隂霞落海新有時城郭去暗與酒家親題萬山許鍊師道成人不識流水響空山花暗軒窗外雲生坐卧間驗圖名已久絶粒事長間更欲崑崙去羞看絳節還丹陽浦送客之海上不到終南向幾秋移居更欲近滄洲風吹雨色連村暗潮擁菱花出岸浮漠漠望中春自艷寥寥泊處夜堪愁如君豈得空高枕只益天書遣逺求别盧使君歸故柵村歸風白馬引嘶聲落日猶看楚客情塞口竹緣空戍沒潮頭沙擁慢岡成松田且欲親耕種郡守何偏問姓名東道宿程投故柵依依漁父解相迎送褚先生海上尋封鍊師潮落風初定天吳避客舟近承三殿旨欲向五湖遊不厭烏皮几新縫鶴氅裘明珠漂斷岸隂火映中流華蓋芝童引神丹桂女收懸知居縹眇因為識浮丘月夜泛舟西塞長雲盡南湖片月斜漾舟人不見卧入武陵花送友人之上都玉帛徵賢楚客稀猿啼相送武陵歸湖頭望入桃花去一片春帆帶雨飛栖白十四首送圓仁三藏歸本國家山臨晚日海路信歸橈樹滅渾無岸風生只有潮嵗窮程未盡天末國仍遙已入閩王夢香花境外邀贈李溟秀才南居古廟深高樹宿山禽明月上清漢騷人動楚吟數篇正始韻一片補亡心孤峭欺何謝雲波不可尋八月十五夜玩月尋常三五夕不是不嬋娟及至中秋滿還勝别夜圓清光凝有露皓魄爽無煙自古皆如此年來又一年送禪師宗極歸玉峯背郭去歸宿頭陀意頗濃鶴爭栖逺樹猿鬬上孤峰夜戍經霜月秋城過雨鐘由來無定止何處訪高蹤尋山僧真勝上人不遇松下禪栖所苔滋徑莫分青山春暮見流水夜深聞不坐看山石應隨出定雲猿猱非可罔巖谷日空曛邊思西北黃雲暮聲聲畫角愁隂山一夜雨白草四郊秋亂雁鳴寒渡飛沙入廢樓何時番色盡此地見芳洲送王鍊師歸嵩嶽飄然緑毛節杳在洛城端隔水見秋嶽兼霜掃石壇一溪松色古半夜鶴聲寒迥與人寰别勞生不可觀送石秀才正是歎羇遊知音拜楚侯何須辭遠道自可樂扁舟倚棹江洲雨聞猿島嶼秋謝家山水興終日待詩流寄南山景禪師一度林前見逺公靜聞真語世情空至今寂寞禪心在任起桃花栁絮風月夜懷劉秀才獨夜相思但自勞阮生吟罷夢雲濤此時小定未禪寂古塔月中松磬高哭劉得仁為愛詩名吟至死風魂雪魄去難招直須桂子落墳上生得一枝寃始鎖經廢宫終日河聲咽暮空煙愁此地晝濛濛錦帆東去沙侵苑玉輦西來樹滿宫魯客望津天欲雪朔鴻離岸葦生風那堪獨立思前事回首殘陽雉堞紅贈識古法師重城深寺講初休却憶家山訪舊遊對月與君相送夜聞蛩教我獨驚秋雲心杳杳難為别鶴性蕭蕭不可留遙想孤舟清渭上飄然帆影起離愁壽昌節賦得紅雲表夏日景候融融隂氣潛如峯雲共火相兼霞光捧日登天上丹彩乘風入殿簷行逐赤龍千嵗出明當朱夏萬方瞻微臣多幸逢佳節得賦殊祥近御簾隱巒四首牧童牧童見人俱不會盡著芒鞋戴篛笠朝陽未出衆山晴露滴蓑衣猶半濕二月三月時平原草初緑三箇五箇騎羸牛前村後村來放牧笛聲才一舉衆稚齊歌舞看看白日向西斜各自騎牛又歸去蜀中送人遊廬山君遊正值芳春月蜀道千山皆秀發溪邊十里五里花雲外三峯兩峯雪君上匡山我舊居松蘿拋擲十年餘君行試到山前問山鳥只今相憶無琴七條絲上寄深意澗水松風生十指自乃知音猶尚稀欲教更入何人耳浮橋橫壓驚波防沒溺當初元創是軍機行人到此全無滯一片江雲踏欲飛處默六首憶廬山舊居粗衣糲食老煙霞免抱衰顔惜嵗華獨鶴秪為山客伴間雲長在野僧家叢生嫩蕨粘松粉自落乾薪帶蘚花明月清風舊相得十年歸恨可能賖題栖霞寺僧房名山不取買山錢任構花宫近碧巔松檜老依雲裏寺樓臺深鎖洞中天風經險嶂回疏雨石倚危屏挂落泉欲結茅庵體師住肯饒多少薜蘿煙題聖果寺路自中峯上盤回出薜蘿到江吳地盡隔岸越山多古木叢青靄遙天浸白波下方城郭近鐘磬雜笙歌送僧遊西域一盂兼一錫秖此度流沙野性雖為客禪心即是家寺投雲嶠雪路入曉天霞自説遊諸國回應嵗月賖遠煙靄靄前山上凝光滿薜蘿高風吹不盡遠樹得偏多翠與晴雲合輕將淑氣和正堪流野目朱閣意如何山中作席簾髙卷枕高欹門掩垂蘿蘸碧溪間把史書眠一覺起來山日過松西唐僧𢎞秀集卷八

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0051_WYG_001-1a, image: WYG1356/WYG1356-0863a.png}
body:
  text: 唐僧𢎞秀集巻一宋李龏編皎然七十首戛銅椀為龍吟歌唐故太尉房公琯早嵗曾隱終南山峻壁之下往往聞龍吟聲清而靜滌人邪想時有好事僧潜戞以三金冩之惟銅聲酷似他日房公偶至山寺聞林嶺間有此聲乃曰龍吟復遷于兹矣僧因之以告公公命戞之驚曰眞龍吟也大厯十三載秦僧傳至桐江予使兒童戞金倣之亦不减秦聲也緇人或有譏者予曰此達僧之事可以嬉禪爾曹無以瑣行自拘因賦詩以見其意逸僧戞椀為龍吟世上未曾聞此音一從太尉房公賞遂使秦人傳至今初戞徐徐聲漸顯樂章不管何人辨似出龍淵萬丈底乍怪聲來近而逺未必全由戞者工眞生虛無非椀中寥亮掩清狖縈廻凌細風遥聞不㫁在煙杪萬籟無聲天境空聽專一境則衆音不聞非萬籟之無聲也昨向天台宿華頂秋宵一吟更清迥能令聽者易常性憂人忘憂躁人靜今日鏗鍠江上聞蛟螭奔飛如得羣聲過隂嶺忽成雨響駐晴天將起雲坐來吟盡江空碧却尋向者聲無迹人生萬事將此同暮賤朝榮動還寂周昉長史畫毘沙門天王歌長史畫神獨感神高歩區中無兩人雅而逸高且眞形生虛無忽可親降魔大㦸縮在手倚天長劒横諸紳慈威示物雖凛栗在徳無秋惟有春吾知眞像本非色此中妙用君心得苟能下筆有神造誤㸃一㸃亦為道寫出霜縑可舒卷何人曽識此情逺秋齋清寂無外物盥手焚香聊自展憶昔邊兵圍未解感得此神天上下至今雲旗圖我形為君一顧煙塵清買藥歌送楊山人華隂少年何所希欲餌丹砂化骨飛江南藥少淮南有暫别胥門出京口京口斜通江水流徘徊應上青山頭夜驚潮没鸕鶿堰朝㸔日出芙蓉樓搖蕩春風亂帆影片雲無數是揚州揚州喧喧賣藥市浮俗無由識仙子河間姹女直千金紫陽夫人服不死吾于此道復何如昨朝新得蓬萊書飲茶歌送鄭容丹丘羽人輕玉食採茶飲之生羽翼天台記云丹丘出大茗服之羽化名藏仙府世空知骨化雲宫人不識雪山童子調金鐺楚人茶經虛得名霜天半夜芳草折爛漫緗花啜又生賞君此茶袪我疾使人胸中蕩憂慄日上香爐情未畢亂踏虎溪雲高歌送君出姑蘇行古臺不見秋草衰却憶吳王全盛時千年月照秋草上呉王在時幾囘望至今月出君不還世人空對姑蘇山山中精靈安可覩轍跡人踪麋鹿聚嬋娟西子傾國容化作寒陵一堆土短歌行古人若不死吾亦何所悲蕭蕭煙雨九原上白楊青松塟者誰貴賤同一塵死生同一指人生在世共如此何異浮雲與流水短歌行短歌無窮日已傾鄴宫梁苑徒有名春草秋風傷我情何為不學空門侶一悟空門無死生效古天寳十四年作日出天地正煌煌闢晨曦六龍驅羣動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡長桑枝渴死化爝火嗟嗟徒爾為空留鄧林在摧折令人嗤寓興天下生白榆白榆直上連天根高枝不知幾萬丈世人仰望徒攀援誰能上天採其子種向人間笑桃李因問老仙求種法老仙咍我愚不答始知此道無所成還如瞽夫學長生答蘇州韋使君應物詩教殆淪缺庸音互相傾忽觀風騷韻會我宿昔情蕩漾學海資鬱為詩人英格将寒松高氣與秋江清何必鄴中作可為千載程受辭分虎竹萬里臨江城一到掃煩政況今休黷兵應憐禪家子林下寂無營跡隳世上華心得道中精脱畧文字累免為外物攖書衣流埃積硯石駁蘚生恨未識君子空傳手中瓊安可誘我性始願懲素誠為無鸑鷟音繼公雲和笙吟之向禪藪反媿幽松聲酬李司直縱諸公冬日遊妙喜寺題照昱二上人房寄長城潘丞述達賢貴貞隠常懼迹不滅遂與永公期遺身坐林樾華軒何轔轔為我到幽絶心境寒草花空門青山月潘生獨不見清景屡盈缺林下長寂寥人間自離别何時解輕珮來税丘中轍山居示靈澈上人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閒始覺隳名是心了方知苦行非外物寂中誰似我松聲草色共無機酬薛員外誼苦熱行六月金數伏兹辰日在庚炎曦曝肌膚毒霧昏檐楹安得奮翅翮超遙出雲征不知天地心如何匠生成火徳燒百卉瑤草不及榮省客當此時忽貽懐中瓊捧翫煩袂滌嘯歌美風生遲君佐元氣調使四序平中令霜不祅火餘氣常貞江南詩騷客休吟苦熱行訪陸羽處士不遇太湖東西路呉王古山前所思不可見歸鴻自翩翩何山賞春茗何處弄春泉莫是滄浪子悠悠一釣船戲題贈呉慿予讀古人書遂識古人靣不是識古人邪正心自見貴義輕財求俗譽一錢與人便驕倨昨朝為火今為冰此道非君獨撫膺奉應顔使君眞卿與陸處士羽登妙喜寺三癸亭秋意西山多列岑縈左次繕亭厯三癸以癸丑嵗癸夘朔癸亥日立故名顔名陸創疏址隣什寺元化隠靈蹤始君啓高致誅榛養翹楚鞭草理芳蕙俯砌披水容逼天掃峰翠境新耳目換物遠風煙異倚石忘世情援雲得眞意嘉林幸勿翦禪侣欣可庇衛法大臣過佐遊羣英萃龍池䕶清澈虎節到深邃徒想嵊頂期于今沒遺記冬日天目西峰張鍊師所居採薪逢野泉漸見棲閒所坎坎山上聲幽幽林中語仙卿何代隠鄉服言亦楚開冰洗藥苖掃雪候山侣零葉聚敗籬幽花積寒渚㝠㝠孤鶴性天外思輕舉出遊少時不見山便覺無竒趣狂發從亂歌情來任閒步此心誰共證笑看風吹樹題周諫别業隠身苕上欲如何不著青袍愛綠蘿栁巷任疎容騎入水籬從破許船過昻藏獨鶴閒心逺寂厯秋花野意多若訪禪齋遙可見竹忩書幌共煙波奉酬李員外嘉祐蘇臺屏居春首有懐昔嵗為邦初未識今朝休沐始相親移家水巷貪依靜種栁風忩欲占春詩思先邀烏府客山情閒訪白樓人登臨許作煙霞伴高在方袍閒幅巾送闗小師還金陵如何有歸思愛别欲忘難白鷺沙洲晚青龍水寺寒蕉花鋪淨地桂子落空壇持此為心境應堪月夜㸔酬襄陽詩僧少微詩中答上人歸夢之意證心何有夢示説夢歸頻文字齎秦本法華文字多苻秦本詩騷學楚人蘭開衣上色栁向手中春别後須相見浮雲是我身早秋桐廬思歸示道諺上人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿來觸淨水鳥下啄寒棃可即闗吾事歸心自有期舟行懐閻士和二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲兩三片寄題雲門寺梵僧無側房時人傳是寳月後身越山千萬雲門絶西僧貌古還名月清朝掃石行道歸林下眠禪看松雪法華寺上方題江上人禪室路入松聲逺更竒山光水色共參差中峰禪寂一僧在坐對梁朝老桂枝題秦系山人麗句亭獨將詩教領諸生但愛青山不愛名滿院竹聲堪愈疾亂牀花片足忘情奉和顔使君修韻海畢州中重宴得雙字世學高南郡身封盛魯邦九流宗韻海七字揖文江惜賞雲歸堞留歡月在忩不知名教樂千載與誰雙游溪待月溪色思泛月沿洄欲未歸殘燈逢水店疎磬憶山扉夜浦魚驚少空林鵲遶稀可中纔望見撩亂擣寒衣往丹陽尋陸處士不遇遠客殊未歸我來幾惆悵叩闗一日不見人繞屋寒花笑相向寒花寂寂遍荒阡桞色蕭蕭愁暮蟬行人無數不相識獨立雲陽古木邊鳯翅山中思古寺魚竿村口望歸船歸船不見見寒煙離心遠水共悠然他日相期那可定閒僧著處即經年寄常一上人雁塞五山臨汗漫雲州一路出青㝠何因請住嘉祥寺内史新修湖上亭贈栁喜自號嵩山老一見嵩山老吾生恨太遲問君年幾許曾出上皇時酬秦系山人見寄左右香童不識君擔簦訪我領鷗羣山僧待客無俗物惟有忩前片碧雲聽寒更寄朱巨川欹枕聴寒更寒更發還住一夜千萬聲幾聲到君處秋居法華寺下院望高頂贈如獻上人峰色秋天見松聲靜夜聞影孤長不出行道在深雲送沈秀才之閩中得過字楚客未成歌春風起綠波嶺重寒不到海遠瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何送履霜上人還金陵西山攜錫西山步綠莎禪心未了奈情何湘宫水寺清秋夜月落風悲松柏多送顧道士遊洞庭見説洞庭無上路春遊亂踏五靈芝含桃風起花狼籍正是仙翁棊散時送邢台州濟海上仙山屬使君石橋琪樹古來聞他時畫出白團扇乞取天台一片雲冬日梅溪送裴方舟之宣州平明匹馬上村橋花發梅溪雪未消日短天寒愁送客楚山無限路遙遙送秘上人遊京共居方異路山伴與誰同日冷行人少時清古鎮空煖瓶和雪水鳴錫帶江風撩亂終南色遙應入夢中送贇上人還京得微字久遊春草盡還寄北船歸沙鳥窺中食江雲入淨衣秦原山色近楚寺磬聲微見説翻經館多聞似爾稀送李秀才赴盧婺州招得時字山開江上色孤賞去應遲緑水延呉榜秋風入楚詞猿清獨宿處木落遠行時見説東陽守登樓為爾期銅雀妓强開樽酒向陵㸔憶得君王舊日歡不覺餘歌悲自斷非闗艷曲轉聲難長門怨春風日日閉長門搖蕩春心似夢䰟若遣花開只笑妾不知桃李自無言啼猿送客萬里巴江外三聲月峽深何年有此路幾客共沾襟斷臂分垂影流泉入苦吟悽凉離别後聞此更傷心江上風江風西復東飄暴忽何窮初生虚無際稍起蕩漾中應吹夏口檣竿折定蹙湓城浪花咽今朝莫怪沙岸明昨夜聲狂捲成雪夏日登觀農樓和崔論使君詠微雨片雨拂簷楹煩襟四座清霏微過麥隴蕭散傍莎城靜愛和花落幽聞入竹聲朝觀趣無限高詠寄閒情南樓望月夜月家家望亭亭愛此樓纎雲溪上斷疎栁影中秋漸映千峰出遙分萬派流闗山誰復見應獨起邊愁詠史田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問高車與珠履何如卑賤一書生送常清上人歸舒州灊人思爾法楚信有囘船估客親宵話閒鷗偶晝禪經聲含石浪麈尾拂江煙常説歸山意誅茅廬霍前送志洪沙彌赴上元受戒上元江中有蔡洲古戒壇不肯資章甫勝衣被木蘭今隨秣陵信欲及蔡洲壇野寺鐘聲逺春山戒足寒歸來次第學應見後心難送烏程李明府得陟狀赴京驛吏滿江城深仁見此情士林推玉振公府薦冰清為政移風久承恩就日行仲容綸綍貴南巷有光榮尋陸鴻漸不遇移家雖帶郭野徑入桑麻近種籬邊菊秋來未著花扣門無犬吠欲去問西家報道山中去歸時每日斜懐舊山或作滄浩一坐西林寺從來未下山不因尋長者無事到人間宿雨愁為客寒花笑未還空懐舊山月童子念經閒送禀上人遊越雲泉誰不賞獨見爾情高投宿輕龍窟臨流笑鷺濤折荷為片席灑水淨方袍剡路逢禪侣多應問我曹從軍行黄紙君王詔青泥校尉書誓師張虎落選将擐犀渠霧暗津蒲失天寒塞栁疏横行十萬騎欲掃虜塵餘隴頭水隴頭心欲絶隴水不堪聞碎影搖槍壘寒聲咽幔軍素從鹽海積緑帶栁城分日落天邊望逶迤入塞雲塞下曲二首寒塞無因見落梅朔風吹入笛聲來勞勞亭上春應度夜夜城南戰未囘都䕶今年破武威黄沙萬里鳥空飛旄竿瀚海掃雲出氊騎天山踏雪歸支公詩支公養馬復養鶴率性無羇多脫畧天生支公與凡異凡情不到支公地得道由來天上仙為僧却下人間寺道家諸子論自然此公惟許逍遙篇山隂詩友喧四座佳句縱横不廢禪宿呉匡山破寺與餘不溪廢寺詩畧同雙峰百戰後眞界滿塵埃蔓草縁空壁悲風起故臺野花寒更發山月暝還來何事池中水東流獨不囘少年行翠樓春酒蝦蟇陵長安少年皆共矜紛紛半醉緑槐道躞蹀花驄驕不勝春日杼山寄李縱員外南山惟與北山鄰一閉禪闗老此身一作古樹連拳伴我身黄鶴有心多不住白雲何一作無事獨相親閒持竹杖行一作深看水嬾著麻衣出見人無限幽芳徒欲寄一作欲掇幽芳聊贈逺郎官那賞石門春宿法華寺簡靈澈上人至道無機但杳㝠孤燈寒竹自青熒不知何處小乘客一夜風前聞誦經九月十日愛殺柴桑隠名溪近訟庭掃沙開野步搖舸出閒汀宿簡邀詩伴餘花在酒瓶悠然南望意自有峴山青晚秋破山寺秋風落葉滿空山古寺殘燈石壁間昔日經行人去盡寒雲夜夜自飛還青陽上人院説金陵故事君説南朝全盛日秣陵才子最多人千年秋色古池館誰見齊王西邸春送僧之京師綿綿𣺌𣺌楚雲繁萬里西歸望國門禪子初心易悽斷秋風莫上少陵原送許丞還洛陽剡茗情來亦好斟空門一别肯沾襟悲風不動罷瑤軫忘却洛陽歸客心題湖上草堂山居不買剡中山湖上千峰處處閒芳草白雲留我住世人何事得相闗唐僧𢎞秀集卷一

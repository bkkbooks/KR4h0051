body:
  text: 唐僧𢎞秀集卷七宋李龏編齊已六十首君子行聖人不生麟龍何瑞梧桐不高鳯凰何止吾聞古之有君子行藏以時進退求已榮必為天下榮恥必為天下恥苟進不如此退不如此亦何必用虛僞之文章取榮名而自美風琴引挼音蹉吳絲雕楚竹高託天風拂為曲一一宫商在素空鸞鳴鳯語翹梧桐夜深天碧松風多孤忩寒夢驚流波愁魂傍枕不肯去翻疑住處鄰湘娥金風聲盡薰風發冷泛虛堂韻難歇常恐聽多耳漸繁清音不絶知音絶夏雲曲紅嵯峨爍晚波乖龍慵卧旱鬼多爞爞萬里壓天塹揚雷驅電空閃閃好雨不雨風不風徒倚蒼穹作巖險男巫女覡更走魂焚香祝天天不聞天若聞必能使爾為潤澤洗埃氛而又變之成五色捧日輪將以表唐堯虞舜之明君祈真壇玉甃瑶壇二三級學仙弟子參差入霓旌隊仗下不下松檜森森天露溼殿前寒氣束香雲朝祈暮禱𤣥元君茫茫俗骨醉更昏樓臺十二遙崑崙縱廣一萬二千里中有五色雲霞五色水何當斷欲便飛去不要九轉神丹换精髓讀李白集竭雲濤刳巨鼇搜括造化空牢牢冥心入海海神怖驪龍不敢為珠主人間物像不供取飽飯遊神向𤣥圃鏘金鏗玉千餘篇膾吞炙嚼人口傳須知一一丈夫氣不是綺羅兒女言觀李瓊處士畫海濤巨鼇轉側長鰌翻狂濤顚浪高漫漫李瓊奪得造化本都盧縮在秋毫端一揮一畫皆筋骨滉漾崩騰大鯨臬葉樣仙槎擺欲沉下頭應是驪龍窟昔年曾夢涉蓬瀛惟聞撼動珊瑚聲今來正歎陸沈久見君此畫思前程千尋萬派功難測海門山小濤頭白令人錯認錢塘城羅剎石底奔雷霆湘妃廟湘煙濛濛湘水急汀露凝紅裛蓮溼蒼梧雲疊九嶷深二女魂飛江上立相攜泣鳯蓋龍輿追不及廟荒松朽啼飛猩笋鞭迸出階基傾黃昏一片隂風起新月如眉生濶水升天行身不沈骨不重驅青鸞駕白鳯幢蓋飄搖入冷空天風瑟瑟星河動瑶闕參差阿母家樓臺虛閉凝彤霞三五仙子乘龍車堂前碾爛蟠桃花回頭却顧蓬山頂一點濃嵐在深井弔汨羅落日倚䦨干徘徊汨羅曲寃魂如可弔煙浪聲似哭我欲考黿鼉之心烹魚龍之腹爾既啖大夫之血食大夫之肉千載之後猶斯藏伏將謂唐堯之尊還如荒醉之君更有逐臣於焉葬魂得以縱其噬咨其吞贈念法華經僧念念念兮入惡易念念念兮入善難念經念佛能一般愛河無處生波瀾言公少年真法器白晝不出夜不睡心心緣經口緣字一室寥寥燈照地沈檀卷軸寶函盛薝蔔香薰水精記空山木落古寺閒松頂鶴眠霜霰乾牙根舌根冰滴寒珊瑚枝打紅琅玕但恐蓮花七朵一時折朵朵似君心簇攢又恐風緊吹天花繽紛如雨飄袈裟况聞此經甚微妙百千諸佛真祕要靈山說後始傳來聞者雖多持者少更堪誦入陀羅尼此云總持唐音梵音相雜時舜絃和雅薰風吹文王武王絃更悲如此爭不遣空碧中有龍來聽有鬼來聽亦使人間聞者敬見者敬自然虛空性清淨此經真體即毗盧毗盧此云種種光雪嶺白牛君識無行路難行路難君好看驚波不在黤黮間小人心裏藏崩湍七盤九折寒崷崒翻車倒蓋猶堪出未似是非唇舌危暗中潛毁平人骨君不見楚靈均千古沈寃湘水濱又不見李太白一朝却作江南客謝徽上人惠二龍障子我見蘇州崑山金城中金城柱上有二龍老僧相傳道是僧繇手尋常入海共龍鬭又聞蜀國玉局觀有孫遇跡盤屈身長八十尺遊人爭看不敢近頭覷寒泉萬丈碧近有五羊徽上人閒工小筆得意新畫龍不誇頭角及鬚鱗只求筋骨與精神徽上人真藝者惠我雙龍不言價等閒不敢將懸掛恐似葉公好假龍及見真龍却驚怕夏日草堂沙泉帶草堂紙帳卷空牀靜是真消息吟非俗肺腸園林坐清影梅杏嚼紅香誰住原西寺鐘聲送夕陽早梅萬木冬欲折孤根暖獨回前村深雪裏昨夜一枝開風遞幽香出禽窺素艷來明年如應律先發映春臺寄鏡湖方干處士賀監舊山川空來近百年聞君與琴鶴終日在漁船島露深秋石湖澄半夜天雲門幾回去題遍好林泉送人遊塞槐栁野橋邉行塵暗馬前秋風來漢地客路入胡天雁聚河流濁羊羣磧草羶那堪隴頭宿鄉夢逐潺湲新秋雨後夜雨洗河漢詩懷覺有靈籬聲新蟋蟀草影老蜻蜓靜引閒機發凉吹逺思醒逍遙向誰說時注漆園經送遷客天涯即愛州謫去莫多愁若似承恩寵何如佞主休瘴昏銅柱黑草赤火山秋應想堯階下當時獬豸頭經吳平觀中元齊醮後殘燼滿空壇老鶴心何待尊師鬢己乾幡燈古殿夜霜霰大椿寒誰見長生路人間事萬端白髮莫染亦莫鑷任從伊滿頭白雖無耐藥黑也不禁秋靜枕聽蟬卧閒垂看水流浮生未達此多為爾為愁秋興寄𦙍公風聲吹竹健凉氣著身輕誰有閒心去江邊看水行村遙紅樹迥野闊白煙平試裂芭蕉片題詩問竺卿送中觀進公歸巴陵一論破雙空持行大國中不知從此去何處挫邪宗晝雨懸帆黑殘陽泊島紅應遊到㴩岸相憶繞茶叢贈曹松先輩今嵗赴春闈達如夫子稀山中把卷去榜下注官歸楚月吟前落江禽酒外飛閒遊向諸寺却看白麻衣傷鄭谷郎中鍾陵千首作筆絶亦身終知落干戈裏誰家煨燼中吟齊春長蕨釣渚夜鳴鴻惆悵秋江月曾招我看同題終南山隱者室終南山北靣直下是長安自掃青苔室閒欹白石看風吹窗樹老日曬竇雲乾時向圭峰宿僧房瀑布寒經費徵君舊居高眠當聖代雲鳥未為孤天子徵不起閒人親得無猿猱狂欲墜水石怪難圖寂寞荒齊外杉松相倚枯原上晚望倚杖聊攄望寒原遠近分夜來何處火燒出古人墳野勢盤空澤江流合暮雲殘陽催百鳥各自看栖羣聞貫休下世吾師詩匠者真箇碧雲流爭得梁太子更為文選樓錦江新冢樹婺女舊山秋欲去焚香禮啼猿峽阻修山寺喜道者至閏年春過後山寺始花開還有無心者閒尋此日來鳥幽聲忽斷茶好味重回知住南巖久冥心坐緑苔已卯嵗值凍阻歸有作河冰連地凍朔氣壓春寒閉户思歸逺出門移步難湖雲粘雁重廟樹括風乾坐看孤燈焰微微向曉殘寄懷江西僧達禪弟長憶舊山日與君同聚沙未能精貝葉便學咏楊花苦甚傷心骨清還切齒牙何妨繼餘習菩薩修行餘習未盡前世是詩家過陳陶處士舊居一室貯琴樽詩皆大雅言夜過秋竹寺醉打老僧門遠燒來籬下寒蔬簇石根閒庭除鶴跡半是杖頭痕春興栁暖鶯多語花明草盡長風流在詩句牽率繞池塘叫切禽名宇飛狂蝶姓莊時來真可惜自勉掇蘭芳過商山疊疊疊嵐寒紅塵翠裏盤前程有名利此路莫艱難雲木侵天老輪蹄到月殘何能尋四皓過盡見長安贈無本上人往年吟月社因亂散揚州未是無端事何妨出世遊洞庭禪過臘衡嶽坐經秋終說將衣鉢天台老去休題真州精舍波心精舍好那岸是繁華礙目無高樹當門即遠沙晨齊來海客夜磬到漁家石鼎秋濤靜禪回有嶽茶謝人惠藥五金元造化九鍊更精新敢謂長生客將遺必死人久餐應換骨一服已通神終逐淮王去永拋浮世塵秋夜聽業上人彈琴萬物都寂寂堪聞彈正聲人心盡如此天下自和平湘水㵼秋碧古風吹太清往年廬嶽奏今夕更分明中春愴懷寄二三知已眼暗心還白逢春强憑欄因聞積夜雨却憶舊山寒竹撼煙叢滑花燒露朵乾故人相㑹處應話此衰殘聞落葉楚樹霜晴後蕭蕭落晚風因思故國夜流水幾株空煮茗燒乾脆行苔踏爛紅來年未離此還見碧叢叢逢詩僧禪𤣥無可示詩妙有何評五七字中苦百千年後清難求方至理不朽始為名珍重重相見忘機話此情送人南遊且聽吟贈逺君此去䝉州瘴國頻聞說邊鴻亦不遊蠻花藏孔雀野石隱犀牛到彼誰相慰知音有郡侯謝虛中上人晚秋見寄楚外同文在荆門得信時幾重相别意一首晚秋詩日暮山沈雨蓮殘水滿池登樓試南望為子動歸思聽泉落石幾萬仞遠聲飄冷空高秋初雨後半夜亂山中只有照壁月更無吹葉風省曾廬嶽聽到曉與僧同弔杜工部墳鵬翅踏於斯明君知不知域中詩價大荒外土墳卑瘴雨無時滴蠻風有穴吹惟應李太白精魄往來疲寄廬嶽僧一聞飛錫别區中深入西南瀑布峰天際雪埋千片石洞前冰折幾株松煙霞明媚栖心地苔蘚縈紆出世踪莫問江邊舊居寺火燒兵劫斷秋鐘送泰禪師歸南嶽石龕閒鎖白雲邊歸去途程半在船林簇曉霜離水寺路穿新燒入山泉已尋嵐壁臨空盡却看星辰向地懸有興寄題紅葉上不妨收拾别為編荆州貫休大師舊房疏篁抽笋栁垂隂舊是休公種此吟入貢文儒來請益出官卿相駐過尋右軍書畫神傳髓康樂文章夢授心消得青城千嶂下白蓮標塔帝恩深韶陽微公曲江晴影石千株吾子思歸夢斷初有信北來山疊疊無言南去雨疏疏祖師門接園林路丞相家同井邑居閒野老身留得否相招多是秀才書蚤鶯何處經年絶好音暖風催出囀喬林羽毛新刷陶潛菊喉舌初調叔夜琴藏雨並棲紅杏密避人雙入緑楊深曉來枝上千般語應共桃花說舊心寄萍鄉唐禀正字新詩聲價滿皇都高卧林中更起無春興酒香薰肺腑夜吟雲氣濕髭鬚同登水閣僧皆别共上漁船鶴亦孤長憶前年送行處洞門殘日照菖蒲送李才歸湘中詞客攜文訪病夫因吟送别憶湘湖寒消浦溆催鴻雁暖入溪山養鷓鴣僧向月中尋嶽麓雲從城上去蒼梧君歸為問峰前寺舊住松房鎖在無聞尚顔上人創居有寄麓山南靣橘州西别搆新齊與竹齊野客已聞將鶴贈江僧未說有詩題窗臨香靄雲千嶂枕遍潺湲月一溪可想乍移吟榻處松隂冷濕壁新泥遣懷詩病相兼老病深世醫徒更費千金餘生豈必處拋擲未死何妨樂咏吟流水不回休歎息白雲無迹莫追尋閒身自有閒消處黃葉清風蟬一林送人入蜀何必閒吟蜀道難知君心出險巇間尋常秋泛江陵去容易春浮錦水還兩面碧懸神女峽幾重青出丈人山文君酒市逢初雪滿貰新沽洗旅顔寄南嶽泰禪師江頭默想坐禪峰白石山前萬丈空山下獵人應不到雪深花鹿在庵中寄清溪道者萬重千疊紅霞嶂夜燭朝香白石龕常記溪窗憑危檻看經影落古龍潭貽九華上人一法傳聞繼老能九華閒卧最高層秋鐘盡後殘陽暝門掩松邊雨夜燈謝猿皮貴向獵師家買得攜來乞與坐禪床不知嘯月秋潭畔曾對何人啼斷腸酬光上人禪言難後到詩言坐石心同立月魂應記前秋㑹吟處五更猶立老松根無本四首馬嵬長川幾處樹青青孤驛危樓對翠屏一自武皇惆悵後至今來往馬蹄腥行次漢上習家池沼草萋萋嵐樹光中信馬蹄漢主廟前湘水碧一聲風角夕陽低尋隱者不遇松下問童子言師採藥去只在此山中雲深不知處寄友聞說到揚州吹簫有舊遊人來多不見莫是上迷樓唐僧𢎞秀集卷七

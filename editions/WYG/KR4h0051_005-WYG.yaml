body:
  text: 唐僧𢎞秀集卷五宋李龏編文益二首覩木平和尚木平山裏人貌古言復少相㸔陌路同論心秋月皎壊衲線非蠶助歌聲有鳥城闕今日來一漚曾已曉㸔牡丹擁毳對芳叢由來趣不同髪從今日白花是去年紅艷曳一作色隨朝露馨香逐晚風何須待零落然後始知空可止四首山居雪消春力展花漫洞門垂果長纎枝曲巖崩直道移重猿圍淺井鬬鼠下疎籬寒食微燈在高風勢徹陂寄積麥山㑹如長老黙然知大道塵世不相闗青檜行時靜白雲禪處閒貧高一生行病長十年顔夏滿期遊寺尋山又下山送僧四海無拘繫行心興自濃百年三事衲萬里一枝笻夜減當晴影春消過雪蹤白雲深處去知宿在何峰哭賈島燕生松雪地蜀死葬山根詩僻降今古官卑悞子孫塚欄寒月色人哭苦吟魂暮雨滴碑字年年添蘚痕清江十三首夕次襄邑何處成吾道經年逺路中客心猶向北河水自歸東古戍鳴寒角疎林振夕風輕舟惟載月那與故人同嚴秘書宅會章八元佳期曾不逺甲第即南隣惠愛偏相及經過豈厭貧秋寒林葉動夕霽月華新莫話羇栖事平原是主人贈淮西賈兵馬使破虜功成百戰場天書新拜漢中郎映門旌斾春風起對客絃歌白日長堦下鬬雞花乍發營南試馬栁初黄由來吳楚多同調感激逢君共異鄉送堅上人歸杭州天竺寺十年勞負笈經論化中朝流水知鄉近和風惜别遙雲山零夜雨花岸上春潮歸卧南天竺禪心更寂寥送贊律師歸嵩山禪意歸心急山深定易安清貧修道苦孝友别家難雪路尋溪轉花宫映嶽㸔到時瞻塔暮松月向人寒上都詶章十八兄每歎經年别人生有幾年闗河長問道風雨獨隨縁寓蝶成荘夢懐人識禰賢徽猷不及此空媿白華篇登樓望月寄鳯翔李少尹陌上涼風槐葉凋夕陽清露溼寒條登樓望月楚山上月到南樓山獨遙心送秦人超鳯闕目隨陽雁極煙霄軒車不重無名客此地誰能訪寂寥湘州懐古瀟湘連汨羅復對九疑河浪勢屈原塚竹聲漁父歌地荒征騎少天暖浴禽多脈脈東流水古今同奈何七夕七夕景迢迢相逢只一宵月為開帳燭雲作渡河橋映水金冠動當風玉珮搖惟愁更漏促離别在明朝長安卧病身世足堪悲空房卧病時卷簾花雨滴掃石竹隂移已覺生如夢堪嗟壽不知未能通法性詎可免支離送婆羅門僧雪􅊐金河獨向東吳山楚澤意無窮如今白首鄉心盡萬里歸程在夢中精舍遇雨空門寂寂淡吾身溪雨微微洗客塵卧向白雲情未盡任他黄鳥醉芳春小雪江雪臨風不厭㸔更多還恐蔽林巒愁人正在書忩下一片飛來一片寒法照三首寄錢郎中閉門深樹裏閒足為經過駟馬不為貴一僧誰奈何藥苗家自有香飯乞時多寄語嬋娟客将心向薜蘿送清江上人越人僧體古清慮洗塵勞一國詩名逺多生律行高見山援葛藟避世著方袍早晚雲門去儂應逐爾曹送無著禪師歸新羅國萬里歸鄉路隨縁不筭程尋山百衲弊過海一杯輕夜宿依雲色晨齋就水聲何年持貝葉却到漢家城寶月一首行路難君不見孤雁闗外發酸嘶度揚越空城客子心腸斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遙遙徒相思年年望望情不歇取我匣中青銅鏡倩人為君除白髪行路難行路難夜聞南城漢使度使我流淚憶長安廣宣七首駕幸天長寺應制天界宜春賞禪門不掩闗宸遊雙闕外僧引百花間車馬喧長路煙雲淨逺山觀空復觀俗皇鑒此中閒九日菊花詠應詔可訝東籬菊能知節候芳細枝青玉潤繁蕊碎金香爽氣浮朝露濃姿帶夜霜泛杯傳壽酒應共樂時康駕幸聖容院應制大唐國裏千年聖王舍城中百億身却指容顔非我相自言空色是吾真深殿䖍心隨寶輦廣庭徐步引金輪古來貴重縁親近狂客慙為侍從臣聖恩顧問獨遊月磴閣直書其事應制禪居河畔無多地來往尋春物正華磴道上盤千畝竹欄干低數萬人家簷前施飯來飛鳥林下行香踏落花自解刹那知佛性不勞更喻幾塵沙安國寺隨駕幸興唐觀應制東林何殿是西隣禪客垣墻接羽人萬乘遊仙宗有道三車引路本無塵初傳寶訣長生術已證金剛不壊身兩地盡修天上事共瞻鑾駕重來巡三車謂羊車鹿車牛車𤣥門亦有三車謂穴也早秋降誕日獻壽二首應制秋蓂開六葉元聖誕千年繞殿祥風起當空瑞日懸道光中國主人識大羅仙敢贊無疆壽香花上法筵其二萬方瞻聖日九土仰清光罄地山河壮彌天福壽長瑞烟薰法界眞偈啟仁王㸔獻千秋樂千秋樂未央唐僧𢎞秀集卷五

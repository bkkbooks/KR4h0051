  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0051_WYG_004-1a, image: WYG1356/WYG1356-0881a.png}
body:
  text: 唐僧𢎞秀集巻四宋李龏編清塞四十五首留辭杭州姚合郎中波濤千里隔抱疾亦相尋㑹宿逢高燒辭歸值積霖叢桑山店迥孤燭海船深尚有重來約知無省閣心送分定歸靈夏南遊多老疾見說講經稀塞寺幾僧在闗城空自歸帶河衰草斷映月旱沙飛却到禪齋後邊軍識衲衣酬吴之問見贈已當聽鴈夜多事不同居故疾離城晚秋霖見月疎趂鐘闗靜户帶葉卷殘書盪槳期南去荒園久廢鉏送康紹歸建業南朝秋色滿君去意如何帝業空城在民田壞塚多月圓臺獨上栗綻寺頻過籬下西江水相思見白波送耿山人歸湖南南行隨越僧舊業一池菱兩髩已垂雪五湖歸挂罾夜濤鳴柵鎖寒葦露船燈此去應無事却來期未能休糧僧一齋難過日况是更休糧養力時行道聞鐘不上堂惟留煨藥火豈冩化金方舊有山㕑在從僧請作房贈李主簿稅時兼主印每日得閒稀對客方科吏為官亦典衣案遲吟坐待宅近步行歸見説論詩道應愁斷是非栢巖禪師野寺絶依念空山曾遍行老來披衲重病起讀經生乞食嫌村逺尋溪愛路平多年栢巖住不識栢巖名宿開元寺樓西峰殘日落誰見寂寥心孤枕客眠久兩廊僧話深寒扉闗雨氣風葉隠鐘音此愛東樓望仍期别夜尋送僧還南嶽辭僧下水棚因聽嶽鐘聲逺路獨歸寺幾時重到城風高寒葉落雨絶夜堂清自説深居後隣州亦不行春日重至南徐舊居綠水隂空院春深喜再來獨眠從草長留酒㸔花開過雨逺山出向風孤雁囘忽思秋夕事雲物却悠哉送僧歸江南洗足北林去逺途今已分麻衣行嶽色竹杖帶湘雲飢䑕縁危壁寒貍出壊墳前峰一聲磬此夕不同聞贈朱慶餘校書風泉盡結冰寒夢徹西陵越信楚城得逺懐中夜興樹停沙島鶴茶㑹石橋僧寺閣連官舍行吟過幾層尋北岡韓處士相過値早凉松帚掃山房坐石泉痕黑登城蘚色黄逆風沈寺磬初日耀隣桑幾處逢僧説期來宿北岡逢播公帶病稀相見西城早晚來衲衣風壊帛香印雨沾灰坐久鐘聲盡談餘嶽影囘却思同宿夜髙枕説天台入靜隠寺途中作亂雲迷逺寺入路認青松鳥道縁巢影僧鞋印雪蹤草煙連野燒溪霧隔霜鐘更遇樵人問猶言過數峰冬日山居思鄉大野始嚴凝雲天曉色澄樹寒稀宿鳥山迥少來僧背日収忩雪開爐釋硯冰忽然歸故國孤想寓西陵送幻羣法師北京從别後南越幾聽砧住久白髭出講長黄葉深香連隣舍像磬徹逺巢禽寂黙應闗道何人見此心玉芝觀王道士四面松杉合空堂畫老仙蠧根停雪水曲角積茶煙道至機心盡宵清琴韻全暫來還又去不得坐經年出闗後寄賈島故國知何處西風已度闗歸人值落葉逺路入寒山多難喜相識久貧寕自閒惟將來徃信遙慰别離顔春喜友人至山舍鳥鳴春日晚喜見竹門開路自高巖出人騎瘦馬來折花林影動移石澗聲囘更欲留深語重城暮色催留别南徐故人二年䝉見待此夕是前程未斷却來約且伸臨去情潮囘灘鳥下月上客船明他日南徐道縁君又重行書實上人房絶頂言無伴長懐落髪師齋歸門掩雪講徹樹生枝沙井泉澄疾秋鐘韻盡遲里中還受請又爽赤城期早秋過郭涯書堂暑消岡舍清閒語有餘情石水生茶味松風減扇聲逺分臨海雨靜覺掩山城此地秋吟苦時來遶菊行哭閒霄上人林逕西風急松枝講鈔餘凍髭亡夜剃遺偈病時書地燥焚身後堂空著影初此來頻下淚曾省到吾廬送張諲之睦州遙憶新安舊扁舟徃復還淺深㸔水石來往逐雲山到縣餘花在過門五栁閒東征隨子去俱隠薜蘿間題何氏池亭信是虛閒地亭亭亦有苔繞池逢石坐穿竹到山囘果落纎萍散龜行細草開主人偏好事終不厭頻來贈道士藥力資蒼髩應非舊日身一為嵩嶽客幾葬洛陽人石縫瓢探水雲根斧斷薪闗西來往路誰得水銀銀送表兄東南遊山水疊層層吾兄涉又登挂帆春背雁尋磬夜逢僧雪溜懸南嶽江雲蓋秣陵評文永不忘此説是中興晚秋江館寄姚郎中病寄曲江居帶城傍門孤栁一蟬鳴澄波月上見魚擲荒徑葉乾聞犬行越島夜無侵閣色寺鐘寒有隔源聲故園賣盡休歸去湖水秋來空自平同徐處士秋懐少室故居曾居少室黄河畔秋夢長懸未得囘扶病半年離水石思歸一夜隔風雷荒齋幾遇僧眠後野菊頻經鹿踏來燈下此心君共説傍松幽徑幾多苔贈道人布褐高眠石竇春迸泉多濺黑紗巾搖頭説易當朝客落手圍碁對俗人自算天年窮甲子誰同雨夜守庚申擬歸太華何時去他日相尋乞藥銀寄新頭陁見説北京尋祖後瓶盂自挈遶窮邊相逢竹塢晦暝夜一别苕溪多少年逺洞省穿湖底過斷崖曾向壁中禪青城不得師同住坐想滄江意浩然湘漢旅懐傑公一宿空江聽急流仍同賈客坐歸舟逺書來隔巴陵雨衰髩去經彭蠡秋不擬為身謀舊業終期斷榖隠嵩丘吾宗尚作無憀者中夜廢吟生旅愁寄韓司兵多病十年無舊識滄州亂後始逢君已知罷秩辭瀧水相勸移家住嶽雲泗上旅帆侵疊浪雪中歸路踏荒墳更為此别愁應老書劄何由到北軍贈姚合郎中望重來為守土臣清高還似武功貧道從㑹解惟求靜詩造𤣥微不趂新玉帛已知難撓思雲泉終是得閒身兩衙向後長無事門館多逢請益人贈厲𤣥侍御山松徑與瀑泉通巾舄行吟想越中塞雁去經華頂末鄉僧來自海濤東闗分河漢秋鐘絶露滴獼猴夜嶽空抱疾因尋周柱史杜陵寒葉落無窮上陜府姚中丞此心長愛狎禽魚仍候登封獨著書領郡只嫌生藥少在官長恨與山疎成家盡是經綸後得句應多諫諍餘見説養真求退靜溪南泉石許同居送韓評事門枕平湖秋景好水煙松色逺相依罷官餘俸租田種送客囘舟載石歸離岸遊魚逢浪返望巢寒鳥逆風飛嵩陽舊隠多時别閉目閒吟憶翠微宿隠靜寺上方一宿五峰杯渡寺虛廊中夜磬聲分疎林未落上方月深澗忽生平地雲幽鳥背泉栖靜境逺人當燭想遺文暫來此地歇勞足望斷故山滄海濆宿李主簿林亭獨樹倚亭新月入城墻四靣鎖山多去年今夜還來此坐見西風裊燕窠送宗禪師衡陽一别十三春行脚同來有幾人老大却思歸嶽寺當時未漆祖師身送蜀僧萬里獨行無弟子惟齎笻竹與檀龕㸔經更向吳中老應是山川似劒南過僧竹院一生愛竹自未有每到此房歸不能髙人留宿話禪後寂寞雨堂空夜燈送僧草屨初登南客船銅瓶猶貯北山泉衡陽舊寺秋歸後門鎖寒潭幾樹蟬唐僧𢎞秀集卷四
